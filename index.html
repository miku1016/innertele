<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#1a5f9e">
<title>内線帳</title>
<link rel="icon" href="naisen.png" type="image/png">
<link rel="apple-touch-icon" href="naisen.png">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --primary: #1a5f9e;
    --primary-dark: #134a7c;
    --primary-light: #e8f1fa;
    --accent: #2e9cca;
    --bg: #f2f6fc;
    --surface: #ffffff;
    --border: #d0dce8;
    --text: #1a2a3a;
    --text-sub: #5a7080;
    --mobile-badge: #2e9cca;
    --mobile-badge-text: #fff;
    --dept-colors-0: #1a5f9e;
    --dept-colors-1: #2e7d32;
    --dept-colors-2: #6a1b9a;
    --dept-colors-3: #e65100;
    --dept-colors-4: #00695c;
    --dept-colors-5: #4527a0;
    --dept-colors-6: #ad1457;
    --dept-colors-7: #37474f;
    --dept-colors-8: #827717;
    --dept-colors-9: #4e342e;
  }

  body {
    font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  header {
    background: var(--primary);
    color: #fff;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  header img {
    width: 38px;
    height: 38px;
    object-fit: contain;
    filter: brightness(0) invert(1);
    flex-shrink: 0;
  }
  header h1 {
    font-size: 1.15rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    flex: 1;
  }
  header .count {
    font-size: 0.78rem;
    opacity: 0.75;
    white-space: nowrap;
  }

  /* Search */
  .search-wrap {
    padding: 12px 14px 8px;
    position: sticky;
    top: 62px;
    z-index: 90;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
  }
  .search-box {
    display: flex;
    align-items: center;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 0 12px;
    gap: 8px;
    transition: border-color 0.2s;
  }
  .search-box:focus-within {
    border-color: var(--accent);
  }
  .search-box svg {
    color: var(--text-sub);
    flex-shrink: 0;
  }
  .search-box input {
    flex: 1;
    border: none;
    outline: none;
    font-size: 1rem;
    padding: 10px 0;
    background: transparent;
    color: var(--text);
  }
  .search-box input::placeholder { color: #aab4be; }
  #clearBtn {
    display: none;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-sub);
    padding: 4px;
    border-radius: 50%;
    transition: background 0.15s;
  }
  #clearBtn:active { background: var(--border); }

  /* Dept tabs */
  .dept-tabs {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding: 8px 14px;
    scrollbar-width: none;
    -ms-overflow-style: none;
  }
  .dept-tabs::-webkit-scrollbar { display: none; }
  .dept-tab {
    flex-shrink: 0;
    padding: 5px 14px;
    border-radius: 20px;
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    border: 1.5px solid transparent;
    background: var(--surface);
    color: var(--text-sub);
    transition: all 0.18s;
    white-space: nowrap;
  }
  .dept-tab:active { transform: scale(0.96); }
  .dept-tab.active {
    color: #fff;
    border-color: transparent;
  }

  /* List */
  main { flex: 1; padding: 0 0 80px; }

  .section-label {
    font-size: 0.72rem;
    font-weight: 700;
    color: var(--text-sub);
    letter-spacing: 0.08em;
    padding: 10px 16px 4px;
    text-transform: uppercase;
  }

  .card {
    display: flex;
    align-items: center;
    background: var(--surface);
    margin: 0 12px 8px;
    border-radius: 14px;
    padding: 12px 14px;
    gap: 12px;
    box-shadow: 0 1px 4px rgba(26,95,158,0.07);
    text-decoration: none;
    color: inherit;
    transition: box-shadow 0.18s, transform 0.12s;
    -webkit-user-select: none;
    user-select: none;
  }
  .card:active {
    transform: scale(0.985);
    box-shadow: 0 0 0 2px var(--accent);
  }

  .avatar {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.25rem;
    font-weight: 700;
    color: #fff;
    flex-shrink: 0;
  }

  .card-body { flex: 1; min-width: 0; }
  .card-name {
    font-size: 0.98rem;
    font-weight: 700;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-meta {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 3px;
  }
  .dept-badge {
    font-size: 0.68rem;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 5px;
    color: #fff;
    white-space: nowrap;
  }
  .mobile-badge {
    font-size: 0.65rem;
    padding: 1px 6px;
    border-radius: 4px;
    background: var(--mobile-badge);
    color: var(--mobile-badge-text);
    font-weight: 600;
  }
  .card-ext {
    font-size: 0.88rem;
    color: var(--text-sub);
    font-variant-numeric: tabular-nums;
  }

  .call-btn {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    background: var(--primary);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.18s;
  }
  .card:active .call-btn { background: var(--primary-dark); }

  /* No results */
  .no-results {
    text-align: center;
    padding: 60px 24px;
    color: var(--text-sub);
  }
  .no-results svg { opacity: 0.3; margin-bottom: 12px; }
  .no-results p { font-size: 0.95rem; }

  /* Footer */
  footer {
    position: fixed;
    bottom: 0;
    left: 0; right: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 10px 16px;
    font-size: 0.72rem;
    color: var(--text-sub);
    text-align: center;
    z-index: 80;
  }
</style>
</head>
<body>

<header>
  <img src="naisen.png" alt="内線">
  <h1>内線帳</h1>
  <span class="count" id="countLabel"></span>
</header>

<div class="search-wrap">

    </svg>

    <button id="clearBtn" aria-label="クリア">

  <div class="dept-tabs" id="deptTabs"></div>
</div>

<main id="listWrap"></main>

<footer>番号をタップすると電話アプリが起動します</footer>

// Dept color map
const DEPT_ORDER = ['東京','大阪','九州','中国','中部','事業','総務','本社','あさひ','安全'];
const DEPT_COLORS = {};
const PALETTE = ['#1a5f9e','#2e7d32','#6a1b9a','#e65100','#00695c','#4527a0','#ad1457','#37474f','#827717','#4e342e'];
[...new Set(CONTACTS.map(c => c.dept))].sort().forEach((d,i) => {
  const idx = DEPT_ORDER.indexOf(d);
  DEPT_COLORS[d] = PALETTE[(idx >= 0 ? idx : i) % PALETTE.length];
});

let currentDept = 'すべて';
let searchQuery = '';

// Build dept tabs
const depts = ['すべて', ...DEPT_ORDER.filter(d => CONTACTS.some(c => c.dept === d))];
const tabsEl = document.getElementById('deptTabs');
depts.forEach(d => {
  const btn = document.createElement('button');
  btn.className = 'dept-tab' + (d === 'すべて' ? ' active' : '');
  btn.textContent = d;
  if (d !== 'すべて') btn.style.background = '#fff';
  btn.onclick = () => setDept(d);
  tabsEl.appendChild(btn);
});

function setDept(d) {
  currentDept = d;
  document.querySelectorAll('.dept-tab').forEach(b => {
    const isActive = b.textContent === d;
    b.classList.toggle('active', isActive);
    if (isActive) {
      if (d === 'すべて') { b.style.background = '#1a5f9e'; b.style.color = '#fff'; }
      else { b.style.background = DEPT_COLORS[d] || '#1a5f9e'; b.style.color = '#fff'; }
    } else {
      b.style.background = '#fff';
      b.style.color = '';
    }
  });
  render();
}

// Search
const searchInput = document.getElementById('searchInput');
const clearBtn = document.getElementById('clearBtn');
searchInput.addEventListener('input', () => {
  searchQuery = searchInput.value;
  clearBtn.style.display = searchQuery ? 'flex' : 'none';
  render();
});
clearBtn.addEventListener('click', () => {
  searchInput.value = '';
  searchQuery = '';
  clearBtn.style.display = 'none';
  searchInput.focus();
  render();
});

function isMobile(c) {
  return c.name.includes('携帯') || c.yomi.includes('ケイタイ');
}

function avatarChar(name) {
  // Get first meaningful character
  return name.replace(/[（(].*/, '').trim().slice(-1) || name[0];
}

function render() {
  let data = CONTACTS;
  if (currentDept !== 'すべて') data = data.filter(c => c.dept === currentDept);
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    data = data.filter(c =>
      c.name.includes(q) || c.yomi.toLowerCase().includes(q) ||
      c.dept.includes(q) || c.ext.includes(q)
    );
  }

  const countLabel = document.getElementById('countLabel');
  countLabel.textContent = data.length + '件';

  const wrap = document.getElementById('listWrap');
  if (data.length === 0) {
    wrap.innerHTML = `<div class="no-results">
      <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <p>「${searchQuery || currentDept}」に一致する連絡先がありません</p>
    </div>`;
    return;
  }

  // Group by dept if showing all
  let html = '';
  if (currentDept === 'すべて' && !searchQuery) {
    const grouped = {};
    data.forEach(c => {
      if (!grouped[c.dept]) grouped[c.dept] = [];
      grouped[c.dept].push(c);
    });
    DEPT_ORDER.forEach(d => {
      if (grouped[d]) {
        html += `<div class="section-label">${d}</div>`;
        grouped[d].forEach(c => html += cardHtml(c));
      }
    });
    // Any dept not in order
    Object.keys(grouped).filter(d => !DEPT_ORDER.includes(d)).forEach(d => {
      html += `<div class="section-label">${d}</div>`;
      grouped[d].forEach(c => html += cardHtml(c));
    });
  } else {
    data.forEach(c => html += cardHtml(c));
  }
  wrap.innerHTML = html;
}

function cardHtml(c) {
  const color = DEPT_COLORS[c.dept] || '#1a5f9e';
  const mobile = isMobile(c);
  const ch = avatarChar(c.name);
  return `<a class="card" href="tel:${c.ext}">
    <div class="avatar" style="background:${color}">${ch}</div>
    <div class="card-body">
      <div class="card-name">${c.name}</div>
      <div class="card-meta">
        <span class="dept-badge" style="background:${color}">${c.dept}</span>
        ${mobile ? '<span class="mobile-badge">携帯</span>' : ''}
        <span class="card-ext">${c.ext}</span>
      </div>
    </div>
    <div class="call-btn">
      <svg width="20" height="20" fill="none" stroke="#fff" stroke-width="2.2" viewBox="0 0 24 24">
        <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.09 10.8a19.79 19.79 0 01-3.07-8.63A2 2 0 012 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 14.92v2z" transform="translate(1,1)"/>
      </svg>
    </div>
  </a>`;
}

render();
</script>
