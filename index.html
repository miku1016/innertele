<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>内線電話帳</title>

<!-- ホーム画面用のアイコン設定 -->
<link rel="apple-touch-icon" href="naisen.png">
<link rel="icon" type="image/png" href="naisen.png">

<!-- モバイルWebアプリ設定 (ホーム画面から起動した際の挙動) -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="内線電話帳">

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic', sans-serif; background: #fff; color: #222; max-width: 430px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }

  /* Header */
  .header { background: #fff; border-bottom: 1px solid #e0e0e0; padding: 12px 16px 0; position: sticky; top: 0; z-index: 100; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  .header-top { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .header-icon { width: 36px; height: 36px; object-fit: contain; }
  .header-title { font-size: 18px; font-weight: 700; color: #1a6fa8; letter-spacing: 0.02em; }
  .search-box { position: relative; margin-bottom: 10px; }
  .search-box input { width: 100%; padding: 9px 36px 9px 14px; border: 1.5px solid #d0dce8; border-radius: 10px; font-size: 15px; background: #f4f7fb; outline: none; color: #222; transition: border-color 0.2s; }
  .search-box input:focus { border-color: #1a6fa8; background: #fff; }
  .search-box .clear-btn { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; color: #999; font-size: 18px; cursor: pointer; display: none; }
  .search-box input:not(:placeholder-shown) + .clear-btn { display: block; }

  /* Dept tabs */
  .dept-tabs { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
  .dept-tabs::-webkit-scrollbar { display: none; }
  .dept-tab { flex-shrink: 0; padding: 5px 12px; border-radius: 20px; border: 1.5px solid #d0dce8; background: #fff; font-size: 13px; color: #555; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
  .dept-tab.active { background: #1a6fa8; border-color: #1a6fa8; color: #fff; font-weight: 600; }

  /* Contact list */
  .contact-list { flex: 1; overflow-y: auto; padding: 0; }
  .group-header { padding: 6px 16px; background: #f0f4f8; font-size: 12px; color: #888; font-weight: 600; letter-spacing: 0.05em; border-bottom: 1px solid #e8eef4; }
  .contact-item { display: flex; align-items: center; padding: 12px 16px; border-bottom: 1px solid #f0f0f0; cursor: pointer; transition: background 0.12s; gap: 12px; }
  .contact-item:active { background: #e8f0fb; }
  .contact-avatar { width: 42px; height: 42px; border-radius: 50%; background: #d8eaf8; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .contact-avatar img { width: 28px; height: 28px; object-fit: contain; }
  .contact-info { flex: 1; min-width: 0; }
  .contact-name { font-size: 15px; font-weight: 600; color: #1a1a1a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .contact-yomi { font-size: 11px; color: #999; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .contact-meta { text-align: right; flex-shrink: 0; }
  .contact-dept { font-size: 11px; color: #888; margin-bottom: 3px; }
  .contact-ext { font-size: 14px; font-weight: 700; color: #1a6fa8; letter-spacing: 0.04em; }
  .call-btn { width: 38px; height: 38px; border-radius: 50%; background: #1a6fa8; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; transition: background 0.15s; }
  .call-btn:active { background: #0d4f80; }
  .call-btn svg { width: 18px; height: 18px; fill: white; }

  /* No results */
  .no-results { text-align: center; padding: 48px 24px; color: #bbb; }
  .no-results svg { width: 48px; height: 48px; margin-bottom: 12px; opacity: 0.3; }
  .no-results p { font-size: 14px; }

  /* Modal */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200; align-items: flex-end; }
  .modal-overlay.open { display: flex; }
  .modal { background: #fff; border-radius: 20px 20px 0 0; width: 100%; max-width: 430px; margin: 0 auto; padding: 0 0 32px; animation: slideUp 0.25s ease; }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal-handle { width: 36px; height: 4px; background: #ddd; border-radius: 2px; margin: 10px auto 16px; }
  .modal-icon-wrap { text-align: center; margin-bottom: 12px; }
  .modal-avatar { width: 64px; height: 64px; border-radius: 50%; background: #d8eaf8; display: inline-flex; align-items: center; justify-content: center; }
  .modal-avatar img { width: 40px; height: 40px; object-fit: contain; }
  .modal-name { text-align: center; font-size: 20px; font-weight: 700; color: #1a1a1a; padding: 0 24px; }
  .modal-yomi { text-align: center; font-size: 13px; color: #999; margin-top: 4px; }
  .modal-dept { text-align: center; font-size: 13px; color: #1a6fa8; font-weight: 600; margin-top: 6px; }
  .modal-ext-display { text-align: center; font-size: 32px; font-weight: 800; color: #1a6fa8; letter-spacing: 0.1em; margin: 16px 24px; background: #f0f6ff; border-radius: 14px; padding: 14px 0; }
  .modal-actions { display: flex; gap: 12px; padding: 0 24px; }
  .modal-call-btn { flex: 1; background: #1a6fa8; color: white; border: none; border-radius: 14px; padding: 15px; font-size: 16px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: background 0.15s; }
  .modal-call-btn:active { background: #0d4f80; }
  .modal-call-btn svg { width: 20px; height: 20px; fill: white; }
  .modal-close-btn { background: #f0f0f0; color: #555; border: none; border-radius: 14px; padding: 15px 20px; font-size: 15px; font-weight: 600; cursor: pointer; }

  /* Count badge */
  .result-count { text-align: right; font-size: 11px; color: #aaa; padding: 4px 16px 0; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <img class="header-icon" src="naisen.png" alt="Icon">
    <span class="header-title">社内内線電話帳</span>
  </div>
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="名前・よみがな・内線番号で検索" autocomplete="off">
    <button class="clear-btn" id="clearBtn" onclick="clearSearch()">✕</button>
  </div>
  <div class="dept-tabs" id="deptTabs"></div>
</div>

<div class="result-count" id="resultCount"></div>
<div class="contact-list" id="contactList"></div>

<!-- Call Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-icon-wrap">
      <div class="modal-avatar">
        <img src="naisen.png" alt="Profile">

    <div class="modal-dept" id="modalDept"></div>
    <div class="modal-ext-display" id="modalExt"></div>
    <div class="modal-actions">
      <button class="modal-call-btn" id="modalCallBtn">
        <svg viewBox="0 0 24 24"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1-9.4 0-17-7.6-17-17 0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z"/></svg>
        発信
      </button>
      <button class="modal-close-btn" onclick="closeModalDirect()">閉じる</button>
    </div>
  </div>
</div>

const DEPT_COLORS = {
  '東京': '#4a90d9', '大阪': '#e67e22', '九州': '#27ae60',
  '中国': '#8e44ad', '中部': '#c0392b', '総務': '#7f8c8d',
  '事業': '#2980b9', '本社': '#d35400', 'あさひ': '#16a085', '安全': '#c0392b'
};

let currentDept = 'すべて';
let searchQuery = '';

function getDepts() {
  const depts = ['すべて', ...new Set(CONTACTS.map(c => c.dept))];
  return depts;
}

function buildDeptTabs() {
  const tabs = document.getElementById('deptTabs');
  getDepts().forEach(dept => {
    const btn = document.createElement('button');
    btn.className = 'dept-tab' + (dept === currentDept ? ' active' : '');
    btn.textContent = dept;
    btn.onclick = () => {
      currentDept = dept;
      document.querySelectorAll('.dept-tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      renderList();
    };
    tabs.appendChild(btn);
  });
}

function getFiltered() {
  let list = CONTACTS;
  if (currentDept !== 'すべて') list = list.filter(c => c.dept === currentDept);
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    list = list.filter(c =>
      c.name.toLowerCase().includes(q) ||
      c.yomi.toLowerCase().includes(q) ||
      c.ext.includes(q)
    );
  }
  return list;
}

function getYomiGroup(yomi) {
  const first = yomi.charAt(0);
  const groups = ['ア行','カ行','サ行','タ行','ナ行','ハ行','マ行','ヤ行','ラ行','ワ行'];
  const starts = [
    ['ア','イ','ウ','エ','オ'],
    ['カ','キ','ク','ケ','コ','ガ','ギ','グ','ゲ','ゴ'],
    ['サ','シ','ス','セ','ソ','ザ','ジ','ズ','ゼ','ゾ'],
    ['タ','チ','ツ','テ','ト','ダ','ヂ','ヅ','デ','ド'],
    ['ナ','ニ','ヌ','ネ','ノ'],
    ['ハ','ヒ','フ','ヘ','ホ','バ','ビ','ブ','ベ','ボ','パ','ピ','プ','ペ','ポ'],
    ['マ','ミ','ム','メ','モ'],
    ['ヤ','ユ','ヨ'],
    ['ラ','リ','ル','レ','ロ'],
    ['ワ','ヲ','ン']
  ];
  for (let i = 0; i < starts.length; i++) {
    if (starts[i].includes(first)) return groups[i];
  }
  return 'その他';
}

function renderList() {
  const list = getFiltered();
  const container = document.getElementById('contactList');
  const countEl = document.getElementById('resultCount');
  countEl.textContent = list.length + '件';
  container.innerHTML = '';

  if (list.length === 0) {
    container.innerHTML = `<div class="no-results">
      <svg viewBox="0 0 24 24"><path fill="#ccc" d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
      <p>該当する連絡先が見つかりません</p>
    </div>`;
    return;
  }

  const showGroups = !searchQuery && currentDept === 'すべて';
  let grouped = {};
  if (showGroups) {
    list.forEach(c => {
      const g = getYomiGroup(c.yomi);
      if (!grouped[g]) grouped[g] = [];
      grouped[g].push(c);
    });
  } else {
    grouped[''] = list;
  }

  Object.entries(grouped).forEach(([group, contacts]) => {
    if (group) {
      const gh = document.createElement('div');
      gh.className = 'group-header';
      gh.textContent = group;
      container.appendChild(gh);
    }
    contacts.forEach(c => {
      const item = document.createElement('div');
      item.className = 'contact-item';
      item.innerHTML = `
        <div class="contact-avatar" style="background:${(DEPT_COLORS[c.dept] || '#4a90d9') + '22'}">
          <img src="naisen.png" alt="Avatar" style="opacity:0.8; filter:drop-shadow(0 0 1px ${DEPT_COLORS[c.dept] || '#4a90d9'});">
        </div>
        <div class="contact-info">
          <div class="contact-name">${c.name}</div>
          <div class="contact-yomi">${c.yomi}</div>
        </div>
        <div class="contact-meta">
          <div class="contact-dept">${c.dept}</div>
          <div class="contact-ext">${c.ext}</div>
        </div>
        <button class="call-btn" onclick="event.stopPropagation(); openModal(${JSON.stringify(c).replace(/"/g,'&quot;')})">
          <svg viewBox="0 0 24 24"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1-9.4 0-17-7.6-17-17 0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z"/></svg>
        </button>
      `;
      item.onclick = () => openModal(c);
      container.appendChild(item);
    });
  });
}

function openModal(c) {
  document.getElementById('modalName').textContent = c.name;
  document.getElementById('modalYomi').textContent = c.yomi;
  document.getElementById('modalDept').textContent = '【' + c.dept + '】';
  document.getElementById('modalExt').textContent = c.ext;
  document.getElementById('modalCallBtn').onclick = () => window.location.href = 'tel:' + c.ext;
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModalDirect();
}
function closeModalDirect() {
  document.getElementById('modalOverlay').classList.remove('open');
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  searchQuery = '';
  renderList();
}

document.getElementById('searchInput').addEventListener('input', function() {
  searchQuery = this.value;
  renderList();
});

buildDeptTabs();
renderList();
</script>
